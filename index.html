<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVL1</title>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./components/Footer/footer.css">
    <link rel="stylesheet" href="./components/Navbar/navbar.css">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">

    <script src="./components/Logo.js" defer></script>
    <script src="./js/AnimatedBackground.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./js/ScrollAnimation.js" defer></script>
    <script src="./js/ScrollIntoView.js" defer></script>
    <script src="./components/Navbar/Navbar.js" defer></script>
    <script src="./components/Footer/Footer.js" defer></script>
    <script src="./components/Features/Features.js" defer></script>
</head>

<body>
    <canvas id="canvas" width="500px" height="500px"></canvas>

    <app-navbar id="app-navbar"></app-navbar>

    <main class="container">
        <div class="welcomeLanding">
            <div class="landingTitle">
                <app-logo></app-logo>
            </div>
            <p class="landingSubtitle">an RPG Habit Tracker</p>

            <a class="joinWrapper" href="./manage.html">
                <span class="joinText">Join the Adventure</span>
                <svg class="joinArrow" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-arrow-right-icon lucide-arrow-right">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </a>
            <a class="featuresLink" onclick="scrollToId('features', 800, -150)">Check out our features!</a>
        </div>
        <app-features></app-features>
    </main>
    <app-footer></app-footer>
</body>

</html>
