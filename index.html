<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVL1</title>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/main.css">

    <script src="./js/Logo.js" defer></script>
    <script src="./js/AnimatedBackground.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./js/CreateFeatures.js" defer></script>
    <script src="./js/ScrollAnimation.js" defer></script>
    <script src="./js/ScrollIntoView.js" defer></script>
    <script src="./js/NavbarSlide.js" defer></script>
    <script src="./js/HamburgerMenuHandler.js" defer></script>

</head>

<body>
    <canvas id="canvas" width="500px" height="500px"></canvas>
    <nav class="navigation">
        <a href="./index.html" class="logo">
            <app-logo class="logoIcon"></app-logo>
        </a>

        <ul class="linkNav">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./manage.html">Manage</a></li>
            <li><a href="./stats.html">Statistics</a></li>
        </ul>

        <button class="menu" onclick="toggleMenu()">
            <svg class="menuIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="6" cy="6" r="1.5" />
                <circle cx="12" cy="6" r="1.5" />
                <circle cx="18" cy="6" r="1.5" />

                <circle cx="6" cy="12" r="1.5" />
                <circle cx="12" cy="12" r="1.5" />
                <circle cx="18" cy="12" r="1.5" />

                <circle cx="6" cy="18" r="1.5" />
                <circle cx="12" cy="18" r="1.5" />
                <circle cx="18" cy="18" r="1.5" />
            </svg>
        </button>
    </nav>

    <nav class="mobileNavigation">
        <ul class="mobileLinkNav">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./manage.html">Manage</a></li>
            <li><a href="./stats.html">Statistics</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="welcomeLanding">
            <div class="landingTitle">
                <app-logo></app-logo>
            </div>
            <p class="landingSubtitle">an RPG Habit Tracker</p>
            
            <a class="joinWrapper">
                <span href="./manage.html" class="joinText">Join the Adventure</span>
                <svg class="joinArrow" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right-icon lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            <a class="featuresLink" onclick="scrollToId('features', 800, -150)">Check out our features!</a>
        </div>
        

        <div id="features" class="features">
            <div class="featuresLine"></div>
        </div>
    </main>
    <footer>
        <p>© 2026 LVL1. All rights reserved.</p>
        <p>LVL1 is a work in progress.</p>
    </footer>
</body>

</html>
